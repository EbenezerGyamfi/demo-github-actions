name: Build Frontend
on: workflow_dispatch
jobs:
  build: 
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install Node Js
        uses: actions/setup-node@v6
        with: 
          node-version: 'latest'
      - name: Install Dependencies
        run: npm ci
      - name: Run Test
        run: npm test
